# Docker Compose configuration for local development with microservices.
# For production, remove bind mounts and use immutable tagged images.

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5

  estimation-service:
    build: .
    container_name: estimation-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      APP_MODULE: app.estimation.main:app
      APP_PORT: "8001"
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app
    command: sh -c "uvicorn app.estimation.main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  api-gateway:
    build: .
    container_name: api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_MODULE: app.gateway.main:app
      APP_PORT: "8000"
      ESTIMATION_SERVICE_URL: http://estimation-service:8001
    volumes:
      - ./app:/app/app
    command: sh -c "uvicorn app.gateway.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      estimation-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
