# Docker Compose configuration for local development.
# For production, remove the bind mount and the --reload flag.

services:
  estimator:
    build: .
    container_name: estimator
    ports:
      - "8000:8000"

    # Load environment variables (API keys, config) from the local .env file.
    env_file:
      - .env

    # Bind-mount the app/ directory so code changes are reflected immediately
    # inside the container without rebuilding the image.
    volumes:
      - ./app:/app/app

    # Override the default CMD to enable auto-reload on file changes.
    # Remove --reload for production deployments.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped

    # Health check using Python's stdlib (curl is not available in slim images).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
